services:
  - type: web
    name: kai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
